allow_url_fopen=1;
upload_max_filesize = 200M
post_max_size = 200M
display_errors = Off
max_execution_time = 30
max_input_time = 60
max_input_vars = 1000
memory_limit = 128M
session.gc_maxlifetime = 1440
session.save_path = "/opt/alt/php82/var/lib/php/session"
zlib.output_compression = On
